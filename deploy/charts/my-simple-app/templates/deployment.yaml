apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-simple-app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: my-simple-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: my-simple-app
    spec:
      containers:
        - name: app
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.app.port }}
              name: http
          env:
            - name: APP_VERSION
              value: {{ .Values.app.version | quote }}
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:h2:mem:demo"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name