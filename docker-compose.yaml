services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lab02
      POSTGRES_USER: lab02
      POSTGRES_PASSWORD: lab02
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab02 -d lab02"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/polito-cpo-2026/lab-02-backend:0.0.1
    ports:
      - "8080:8080"
    environment:
      APP_VERSION: "0.0.1"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/lab02"
      SPRING_DATASOURCE_USERNAME: "lab02"
      SPRING_DATASOURCE_PASSWORD: "lab02"
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: "org.postgresql.Driver"
      SPRING_H2_CONSOLE_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy