spring.application.name=lab-02-cpo

# Externalized via env vars
app.version=${APP_VERSION:0.1.0}
app.pod-name=${POD_NAME:local}
app.pod-log-interval-ms=${POD_LOG_INTERVAL_MS:30000}

# Datasource — override with SPRING_DATASOURCE_URL in k8s
spring.datasource.url=jdbc:h2:mem:demo;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
